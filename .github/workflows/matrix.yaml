name: generate matrix
run-name: Generate matrix for testing
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      instance:
        description: 'Instance to test against'
        required: true
        default: 'qa'
      customer:
        description: 'Customer to test against'
        required: true
        default: 'pd'
      geography:
        description: 'Geography to test against'
        required: true
        default: 'us'
      realms:
        description: 'Realms to test against'
        required: true
        default: 'global'

env:
  INSTANCE: ${{ github.event.inputs.instance || 'qa' }}
  CUSTOMER: ${{ github.event.inputs.customer || 'pd' }}
  GEOGRAPHY: ${{ github.event.inputs.geography || 'us' }}
  REALMS: ${{ github.event.inputs.realms || '*'}}



jobs:
  create_matrix:
    name: Create matrix
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: create_matrix
        run: |
          python3 ${{ github.workspace }}/scripts/matrix.py

      - name: output matrix
        run: |
          echo ${{ steps.create_matrix.outputs.matrix }}